# Server configuration
server.port=8080

# Filter Layer - Global rate limiting (DDoS protection)
rate.limiter.filter.enabled=true
rate.limiter.filter.requests-per-minute=10

# Service Layer - Endpoint specific rate limiting
rate.limiter.endpoints.hello.requests-per-minute=20
rate.limiter.endpoints.external-default.requests-per-minute=20
rate.limiter.endpoints.external-slow.requests-per-minute=5
rate.limiter.endpoints.external-fast.requests-per-minute=50
rate.limiter.endpoints.premium.requests-per-minute=100

# Client-specific overrides (optional)
# rate.limiter.clients.192.168.1.100.requests-per-minute=1000
